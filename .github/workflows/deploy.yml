name: Deploy to VM

on:
  push:
    branches:
      - main  # change to your branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          envs: CTRADER_CLIENT_ID,CTRADER_CLIENT_SECRET,CTRADER_ACCOUNT_ID,CTRADER_ACCESS_TOKEN,CTRADER_REFRESH_TOKEN
          script: |
            mkdir -p "$HOME/ic-robots"
            cd "$HOME/ic-robots"

            if [ -d "ic-markets" ] && [ ! -d "ic-markets/.git" ]; then
              echo "Directory ic-markets exists but is not a git repo. Cleaning..."
              rm -rf ic-markets
            fi

            if [ ! -d "ic-markets" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git ic-markets
            fi

            cd ic-markets
            echo "Current directory: $(pwd)"
            ls -la

            git fetch origin main
            git reset --hard origin/main

            echo "CTRADER_CLIENT_ID=$CTRADER_CLIENT_ID" > .env
            echo "CTRADER_CLIENT_SECRET=$CTRADER_CLIENT_SECRET" >> .env
            echo "CTRADER_ACCOUNT_ID=$CTRADER_ACCOUNT_ID" >> .env
            echo "CTRADER_ACCESS_TOKEN=$CTRADER_ACCESS_TOKEN" >> .env
            echo "CTRADER_REFRESH_TOKEN=$CTRADER_REFRESH_TOKEN" >> .env
            echo "CTRADER_ENV=demo" >> .env
            echo "HTF_REQUIRE_SLOPE=false" >> .env
            echo "NY_ASIAN_BLOCK_ON_PRIOR_BREAK=false" >> .env

            if [ -f "package.json" ]; then
              mkdir -p logs
              npm install --omit=dev
              pm2 delete all || true
              pm2 start ecosystem.config.cjs --update-env
              pm2 save
            else
              echo "Error: package.json not found in $(pwd)"
              exit 1
            fi
        env:
          CTRADER_CLIENT_ID: ${{ secrets.CTRADER_CLIENT_ID }}
          CTRADER_CLIENT_SECRET: ${{ secrets.CTRADER_CLIENT_SECRET }}
          CTRADER_ACCOUNT_ID: ${{ secrets.CTRADER_ACCOUNT_ID }}
          CTRADER_ACCESS_TOKEN: ${{ secrets.CTRADER_ACCESS_TOKEN }}
          CTRADER_REFRESH_TOKEN: ${{ secrets.CTRADER_REFRESH_TOKEN }}
