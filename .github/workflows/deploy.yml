name: Deploy to GCP VM

on:
  push:
    branches:
      - main  # change to your branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            mkdir -p /home/kelvinmbugua/ic-robots
            cd /home/kelvinmbugua/ic-robots
            
            # If directory exists but is not a git repo, clean it
            if [ -d "ic-markets" ] && [ ! -d "ic-markets/.git" ]; then
              echo "Directory ic-markets exists but is not a git repo. Cleaning..."
              rm -rf ic-markets
            fi

            if [ ! -d "ic-markets" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git ic-markets
            fi
            
            cd ic-markets
            echo "Current directory: $(pwd)"
            ls -la

            git fetch origin main
            git reset --hard origin/main
            
            if [ -f "package.json" ]; then
              mkdir -p logs
              npm install --omit=dev
              pm2 startOrRestart ecosystem.config.cjs --only ic-scalping-bot --update-env
              pm2 save
            else
              echo "Error: package.json not found in $(pwd)"
              exit 1
            fi
